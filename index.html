<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vimico | Digital Transformation & Agile Consulting Experts</title>
    <meta name="description" content="Vimico transforms ideas into digital reality. Expert Agile consulting, Jira & Salesforce implementation, Power BI solutions, and enterprise digital transformation services worldwide." />
    <meta name="author" content="Vimico Private Limited" />
    <meta name="keywords" content="digital transformation, agile consulting, Jira implementation, Salesforce consulting, Power BI, enterprise solutions, business consulting, technology partners, IT consulting India, website development, compliance audit" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Vimico | Digital Transformation & Agile Consulting Experts" />
    <meta property="og:description" content="Transform your business with Vimico's expert Agile consulting, digital transformation, and enterprise technology solutions. 20+ years experience across 3 continents." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vimico.in" />
    <meta property="og:site_name" content="Vimico" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Vimico" />
    <meta name="twitter:title" content="Vimico | Digital Transformation & Agile Consulting" />
    <meta name="twitter:description" content="Expert Agile consulting, Jira & Salesforce implementation, and enterprise digital transformation services." />

    <link rel="canonical" href="https://vimico.in" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Vimico",
      "legalName": "Vimico Private Limited",
      "url": "https://vimico.in",
      "description": "Global business consulting and delivery transformation company specializing in Agile implementation, digital transformation, and operational excellence.",
      "foundingDate": "2005",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "care@vimico.in",
        "contactType": "customer service",
        "availableLanguage": ["English"]
      },
      "sameAs": [
        "https://www.linkedin.com/company/vimico-org"
      ],
      "areaServed": ["India", "Malaysia", "Thailand", "Africa"],
      "knowsAbout": [
        "Agile Methodology",
        "Jira Implementation",
        "Salesforce Consulting",
        "Power BI",
        "Digital Transformation",
        "Website Development",
        "Compliance Audits"
      ]
    }
    </script>

    <!-- Structured Data - LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Vimico",
      "image": "https://vimico.in/logo.png",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
        "opens": "09:00",
        "closes": "18:00"
      },
      "serviceType": [
        "Agile Consulting",
        "Jira Implementation",
        "Salesforce Setup",
        "Power BI Solutions",
        "Website Development",
        "Digital Transformation"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
